name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

# Cancel any in-progress run for the same branch/PR to save runner minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. Type Check ──────────────────────────────────────────────────────────
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: tsc --noEmit
        run: npm run typecheck

  # ── 2. Lint ────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

  # ── 3. Build ───────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [typecheck]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Next.js production build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build-${{ github.sha }}
          path: .next
          retention-days: 7

  # ── 4. Security Audit ─────────────────────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      # devDependencies (tailwindcss, typescript, eslint) are build-only tools
      # and are never shipped — omit them from the audit.
      - name: Audit production dependencies
        run: npm audit --audit-level=high --omit=dev

  # ── 5. Aggregate gate ─────────────────────────────────────────────────────
  #    Branch protection watches only this job.
  ci:
    name: CI
    if: always()
    needs: [typecheck, lint, build, security]
    runs-on: ubuntu-latest
    steps:
      - name: All checks passed
        env:
          RESULTS: ${{ toJSON(needs.*.result) }}
        run: |
          echo "Job results: $RESULTS"
          if echo "$RESULTS" | grep -qE '"failure"|"cancelled"'; then
            echo "One or more CI checks failed."
            exit 1
          fi
          echo "All CI checks passed."
